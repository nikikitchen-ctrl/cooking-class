<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#c0392b">
<link rel="apple-touch-icon" href="https://moto8s55.github.io/cooking-class/icons/icon-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet"><style>@font-face{font-family:'Noto Serif TC';font-style:normal;font-weight:700;src:url('https://fonts.gstatic.com/s/notoseriftc/v23/AYCPpXPpYANMTrIDL4yNMluHC4o.woff2') format('woff2')}</style>
<style>
:root{--red:#8b1414;--red-light:#c0392b;--gold:#d4a843;--bg:#6b0f0f;--bg2:#7a1111;--bg3:#8b1414;--surface:#7a1111;--surface2:#8b1414;--text:#f5ede8;--text2:#e8c4a0;--text3:#c4906a;--border:rgba(212,168,67,0.3);--border2:rgba(212,168,67,0.2);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--gold)}
.header-sub{font-size:11px;color:var(--text3);letter-spacing:0.1em}
.sync-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:6px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.sync-btn.loading .spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{background:var(--surface);border-bottom:1px solid var(--border2);padding:8px 20px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-dot.ok{background:#2ecc71;box-shadow:0 0 6px #2ecc71}
.status-dot.err{background:var(--red-light)}
.status-dot.loading{background:var(--gold);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:12px 8px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.content{padding:16px;padding-bottom:32px}
.page{display:none}
.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text3)}
.date-cards{display:flex;flex-direction:column;gap:10px}
.date-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px}
.date-card.open{border-color:#2ecc71}
.date-card.full{border-color:var(--red)}
.date-card.warn{border-color:var(--gold)}
.date-badge{background:var(--bg3);border-radius:8px;padding:8px 10px;text-align:center;min-width:52px}
.date-month{font-size:10px;color:var(--text3)}
.date-day{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.date-dow{font-size:10px;color:var(--text3)}
.date-info{flex:1}
.date-name{font-size:13px;font-weight:500;margin-bottom:4px}
.date-meta{font-size:11px;color:var(--text3)}
.date-count{text-align:right}
.count-num{font-size:20px;font-weight:700;color:var(--gold)}
.count-label{font-size:10px;color:var(--text3)}
.capacity-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:6px;overflow:hidden}
.capacity-fill{height:100%;border-radius:2px;background:#2ecc71;transition:width 0.4s}
.capacity-fill.warn{background:var(--gold)}
.capacity-fill.full{background:var(--red-light)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-chip{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-chip.active{background:var(--red);border-color:var(--red);color:white}
.applicant-list{display:flex;flex-direction:column;gap:8px}
.applicant-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;cursor:pointer}
.applicant-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.applicant-name{font-size:15px;font-weight:500}
.applicant-count{background:var(--bg3);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--gold)}
.applicant-dates{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap}
.applicant-date-tag{background:var(--bg3);border-radius:4px;padding:2px 6px}
.applicant-note{margin-top:6px;font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:4px 8px}
.danger-card{background:var(--surface);border:1px solid rgba(231,76,60,0.4);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.danger-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.danger-date-name{font-size:14px;font-weight:500;color:var(--red-light)}
.danger-list{font-size:12px;color:var(--text2);line-height:2}
.relocation-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.relocation-name{font-size:14px;font-weight:500;margin-bottom:4px}
.relocation-detail{font-size:12px;color:var(--text3);line-height:1.8}
.decision-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.decision-date-name{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--gold)}
.decision-status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.status-badge{border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500}
.status-badge.open{background:rgba(46,204,113,0.2);color:#2ecc71;border:1px solid rgba(46,204,113,0.4)}
.status-badge.closed{background:rgba(192,57,43,0.2);color:var(--red-light);border:1px solid rgba(192,57,43,0.4)}
.status-badge.pending{background:rgba(212,168,67,0.2);color:var(--gold);border:1px solid rgba(212,168,67,0.4)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{border-radius:8px;padding:8px 16px;font-size:13px;font-family:inherit;cursor:pointer;border:none;font-weight:500}
.btn-primary{background:var(--red);color:white}
.btn-success{background:#27ae60;color:white}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text2)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-text{font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--gold)}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.modal-row:last-child{border-bottom:none}
.modal-label{color:var(--text3)}
.modal-value{font-weight:500;text-align:right;max-width:60%}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(26,10,8,0.85);z-index:150;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-text{font-size:13px;color:var(--text3)}
.section-title{font-size:11px;letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
</style>
</head>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwry7F4jOi80E25qy3WkBPWmCyRSb9QVGxyhntd9_Qqc2YR5iPqPpUkpwyawUBRdAfjHA/exec';
const DATES=[{id:'7/5',label:'7月5日（土）',month:'7月',day:'5',dow:'土',time:'午前10時',capacity:8},{id:'7/12',label:'7月12日（土）',month:'7月',day:'12',dow:'土',time:'午前10時',capacity:8},{id:'7/19',label:'7月19日（土）',month:'7月',day:'19',dow:'土',time:'午前10時',capacity:8},{id:'7/26',label:'7月26日（土）',month:'7月',day:'26',dow:'土',time:'午前10時',capacity:8}];
const DECISION_KEY='cooking_decisions';
function getDecisions(){try{return JSON.parse(localStorage.getItem(DECISION_KEY)||'{}')}catch{return{}}}
function saveDecision(id,s){const d=getDecisions();d[id]=s;localStorage.setItem(DECISION_KEY,JSON.stringify(d))}
let allData=[],currentFilter='all';
function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['dashboard','applicants','danger','relocation','decision'][i]===tab)});document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+tab).classList.add('active')}
function syncData() {
  const btn=document.getElementById('syncBtn'),dot=document.getElementById('statusDot'),st=document.getElementById('statusText');
  btn.classList.add('loading');dot.className='status-dot loading';st.textContent='データを取得中...';
  document.getElementById('loadingOverlay').classList.add('show');
  google.script.run
    .withSuccessHandler(function(result){
      const json=JSON.parse(result);
      if(json.status==='ok'){allData=json.data||[];renderAll();dot.className='status-dot ok';const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});st.textContent='最終同期: '+now+' — '+allData.length+'件取得';showToast('✅ '+allData.length+'件取得しました')}
      btn.classList.remove('loading');document.getElementById('loadingOverlay').classList.remove('show');
    })
    .withFailureHandler(function(e){
      dot.className='status-dot err';st.textContent='エラー: '+e.message;showToast('❌ '+e.message);
      btn.classList.remove('loading');document.getElementById('loadingOverlay').classList.remove('show');
    })
    .getAllData();
}
function renderAll(){renderDashboard();renderApplicants();renderDanger();renderRelocation();renderDecision()}
function normDate(s){if(!s)return'';s=s.toString().trim();const m=s.match(/(\d+)月(\d+)日/);return m?m[1]+'/'+m[2]:s}
function getDateStats(){const st={};DATES.forEach(d=>{st[d.id]={count:0,people:0,names:[]}});allData.forEach(r=>{const d1=normDate(r.date1),p=parseInt(r.people)||1,n=r.name||'名前なし';if(st[d1]){st[d1].count++;st[d1].people+=p;st[d1].names.push(n)}});return st}
function renderDashboard(){const st=getDateStats();document.getElementById('totalApplicants').textContent=allData.length;document.getElementById('totalPeople').textContent=allData.reduce((s,r)=>s+(parseInt(r.people)||1),0);document.getElementById('dateCards').innerHTML=DATES.map(d=>{const s=st[d.id]||{count:0,people:0};const pct=Math.min(100,Math.round(s.people/d.capacity*100));const cls=pct>=100?'full':pct>=75?'warn':'open';return`<div class="date-card ${cls}" onclick="showDateDetail('${d.id}')"><div class="date-badge"><div class="date-month">${d.month}</div><div class="date-day">${d.day}</div><div class="date-dow">${d.dow}</div></div><div class="date-info"><div class="date-name">${d.label}</div><div class="date-meta">${d.time} · 定員${d.capacity}名</div><div class="capacity-bar"><div class="capacity-fill ${cls}" style="width:${pct}%"></div></div></div><div class="date-count"><div class="count-num">${s.people}</div><div class="count-label">/ ${d.capacity}名</div></div></div>`}).join('')}
function renderApplicants(){const fr=document.getElementById('filterRow');fr.innerHTML=`<button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="filterApplicants('all')">すべて</button>`+DATES.map(d=>`<button class="filter-chip ${currentFilter===d.id?'active':''}" onclick="filterApplicants('${d.id}')">${d.label.replace('（土）','')}</button>`).join('');const filtered=currentFilter==='all'?allData:allData.filter(r=>normDate(r.date1)===currentFilter||normDate(r.date2)===currentFilter);document.getElementById('applicantList').innerHTML=filtered.length===0?'<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">該当者なし</div></div>':filtered.map((r,i)=>`<div class="applicant-card" onclick="showApplicantDetail(${allData.indexOf(r)})"><div class="applicant-header"><div class="applicant-name">${r.name||'名前なし'}</div><div class="applicant-count">${r.people||1}名</div></div><div class="applicant-dates"><span class="applicant-date-tag">第一希望: ${r.date1||'未選択'}</span>${normDate(r.date2)?`<span class="applicant-date-tag">第二希望: ${r.date2}</span>`:''}</div>${r.note?`<div class="applicant-note">📝 ${r.note}</div>`:''}</div>`).join('')}
function filterApplicants(id){currentFilter=id;renderApplicants()}
function renderDanger(){const st=getDateStats();const dangers=DATES.filter(d=>(st[d.id]||{people:0}).people>=d.capacity*0.75);document.getElementById('dangerContent').innerHTML=dangers.length===0?'<div class="empty"><div class="empty-icon">⭕</div><div class="empty-text">危険な日程はありません</div></div>':dangers.map(d=>{const s=st[d.id];const pct=Math.round(s.people/d.capacity*100);return`<div class="danger-card"><div class="danger-header"><span>${s.people>=d.capacity?'🔴':'🟡'}</span><span class="danger-date-name">${d.label} — ${s.people}/${d.capacity}名 (${pct}%)</span></div><div class="danger-list">${s.names.map(n=>'・'+n).join('<br>')}</div></div>`}).join('')}
function renderRelocation(){const want=allData.filter(r=>r.relocation&&r.relocation.includes('相談'));document.getElementById('relocationContent').innerHTML=want.length===0?'<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">日程変更の相談はありません</div></div>':want.map(r=>`<div class="relocation-card"><div class="relocation-name">${r.name||'名前なし'} (${r.people||1}名)</div><div class="relocation-detail">第一希望: ${r.date1||'—'}<br>第二希望: ${r.date2||'—'}${r.note?'<br>備考: '+r.note:''}</div></div>`).join('')}
function renderDecision(){const st=getDateStats();const dec=getDecisions();const labels={open:'開催確定',closed:'中止',pending:'検討中'};document.getElementById('decisionContent').innerHTML=DATES.map(d=>{const s=st[d.id]||{people:0};const status=dec[d.id]||'pending';return`<div class="decision-card"><div class="decision-date-name">${d.label}</div><div class="decision-status-row"><span class="status-badge ${status}">${labels[status]}</span><span style="font-size:12px;color:var(--text3)">${s.people}名申込</span></div><div class="btn-row"><button class="btn btn-success" onclick="setDecision('${d.id}','open')">開催確定</button><button class="btn btn-primary" onclick="setDecision('${d.id}','closed')">中止</button><button class="btn btn-outline" onclick="setDecision('${d.id}','pending')">検討中</button></div></div>`}).join('')}
function setDecision(id,s){saveDecision(id,s);renderDecision();showToast('✅ '+{open:'開催確定',closed:'中止',pending:'検討中'}[s]+'に設定しました')}
function showDateDetail(dateId){const date=DATES.find(d=>d.id===dateId);const st=getDateStats();const s=st[dateId]||{count:0,people:0,names:[]};const dec=getDecisions();const labels={open:'開催確定',closed:'中止',pending:'検討中'};document.getElementById('modalTitle').textContent=date.label;document.getElementById('modalBody').innerHTML=`<div class="modal-row"><span class="modal-label">定員</span><span class="modal-value">${date.capacity}名</span></div><div class="modal-row"><span class="modal-label">申込数</span><span class="modal-value">${s.count}件 (${s.people}名)</span></div><div class="modal-row"><span class="modal-label">開催判断</span><span class="modal-value">${labels[dec[dateId]||'pending']}</span></div><div style="margin-top:12px;font-size:11px;color:var(--text3);margin-bottom:6px">申込者</div>${allData.filter(r=>normDate(r.date1)===dateId).map(r=>`<div class="modal-row"><span class="modal-label">${r.name||'名前なし'}</span><span class="modal-value">${r.people||1}名</span></div>`).join('')||'<div style="text-align:center;color:var(--text3);padding:10px">申込者なし</div>'}`;document.getElementById('modalOverlay').classList.add('open')}
function showApplicantDetail(idx){const r=allData[idx];document.getElementById('modalTitle').textContent=r.name||'名前なし';document.getElementById('modalBody').innerHTML=`<div class="modal-row"><span class="modal-label">参加人数</span><span class="modal-value">${r.people||1}名</span></div><div class="modal-row"><span class="modal-label">第一希望</span><span class="modal-value">${r.date1||'—'}</span></div><div class="modal-row"><span class="modal-label">第二希望</span><span class="modal-value">${r.date2||'—'}</span></div><div class="modal-row"><span class="modal-label">日程変更相談</span><span class="modal-value">${r.relocation||'希望しない'}</span></div>${r.note?`<div class="modal-row"><span class="modal-label">備考</span><span class="modal-value">${r.note}</span></div>`:''}<div class="modal-row"><span class="modal-label">申込日時</span><span class="modal-value">${r.timestamp||'—'}</span></div>`;document.getElementById('modalOverlay').classList.add('open')}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
window.addEventListener('load',()=>setTimeout(syncData,500));
</script>
</body>
</html>

</script>
