<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c0392b">
<title>台湾料理教室 陳｜予約管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --red-light: #e74c3c;
  --gold: #d4a843;
  --gold-light: #f0c060;
  --bg: #1a0a08;
  --bg2: #2a1210;
  --bg3: #3a1a16;
  --surface: #2e1510;
  --surface2: #3d1e18;
  --text: #f5ede8;
  --text2: #c4a49a;
  --text3: #8a6058;
  --border: rgba(212,168,67,0.2);
  --border2: rgba(192,57,43,0.3);
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ヘッダー */
.header {
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.header-sub {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.1em;
}
.sync-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
  transition: all 0.2s;
}
.sync-btn:active { opacity: 0.7; transform: scale(0.97); }
.sync-btn.loading .spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ステータスバー */
.status-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 8px 20px;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
}
.status-dot.ok { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
.status-dot.err { background: var(--red-light); }
.status-dot.loading { background: var(--gold); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* タブナビ */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: 0;
  padding: 12px 8px;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.06));
}
.tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

/* コンテンツ */
.content { padding: 16px; padding-bottom: 32px; }
.page { display: none; }
.page.active { display: block; }

/* ダッシュボード */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.05em;
}

.date-cards { display: flex; flex-direction: column; gap: 10px; }
.date-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.date-card:active { transform: scale(0.98); }
.date-card.open { border-color: #2ecc71; }
.date-card.full { border-color: var(--red); }
.date-card.warn { border-color: var(--gold); }

.date-badge {
  background: var(--bg3);
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
  min-width: 52px;
}
.date-month { font-size: 10px; color: var(--text3); }
.date-day { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
.date-dow { font-size: 10px; color: var(--text3); }

.date-info { flex: 1; }
.date-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.date-meta { font-size: 11px; color: var(--text3); }

.date-count {
  text-align: right;
}
.count-num { font-size: 20px; font-weight: 700; color: var(--gold); }
.count-label { font-size: 10px; color: var(--text3); }

.capacity-bar {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.capacity-fill {
  height: 100%;
  border-radius: 2px;
  background: #2ecc71;
  transition: width 0.4s;
}
.capacity-fill.warn { background: var(--gold); }
.capacity-fill.full { background: var(--red-light); }

/* 申込者一覧 */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-chip.active {
  background: var(--red);
  border-color: var(--red);
  color: white;
}

.applicant-list { display: flex; flex-direction: column; gap: 8px; }
.applicant-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.applicant-card:active { transform: scale(0.98); }
.applicant-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.applicant-name {
  font-size: 15px;
  font-weight: 500;
}
.applicant-count {
  background: var(--bg3);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 12px;
  color: var(--gold);
}
.applicant-dates {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.applicant-date-tag {
  background: var(--bg3);
  border-radius: 4px;
  padding: 2px 6px;
}
.applicant-note {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text2);
  background: var(--bg3);
  border-radius: 6px;
  padding: 4px 8px;
  line-height: 1.5;
}

/* 危険日程 */
.danger-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
}
.danger-card {
  background: var(--surface);
  border: 1px solid rgba(231,76,60,0.4);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.danger-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.danger-icon { font-size: 18px; }
.danger-date-name { font-size: 14px; font-weight: 500; color: var(--red-light); }
.danger-list { font-size: 12px; color: var(--text2); line-height: 2; }

/* 移動相談 */
.relocation-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.relocation-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.relocation-detail { font-size: 12px; color: var(--text3); line-height: 1.8; }

/* 開催判断タブ */
.decision-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.decision-date-name { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: var(--gold); }
.decision-status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.status-badge {
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
}
.status-badge.open { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.4); }
.status-badge.closed { background: rgba(192,57,43,0.2); color: var(--red-light); border: 1px solid rgba(192,57,43,0.4); }
.status-badge.pending { background: rgba(212,168,67,0.2); color: var(--gold); border: 1px solid rgba(212,168,67,0.4); }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-weight: 500;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--red); color: white; }
.btn-success { background: #27ae60; color: white; }
.btn-warning { background: var(--gold); color: var(--bg); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text2); }

/* 空状態 */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-text { font-size: 14px; }

/* モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 20px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--gold); }
.modal-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border2);
  font-size: 13px;
}
.modal-row:last-child { border-bottom: none; }
.modal-label { color: var(--text3); }
.modal-value { font-weight: 500; text-align: right; max-width: 60%; }

/* トースト */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ローディング */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,10,8,0.85);
  z-index: 150;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { font-size: 13px; color: var(--text3); }

/* 装飾 */
.section-title {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-left: 2px;
}
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">台湾料理教室 陳</div>
      <div class="header-sub">予約管理システム</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncData()">
      <span class="spin" id="syncIcon">🔄</span>
      <span>同期</span>
    </button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">未接続 — 同期ボタンを押してください</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">
    <span class="tab-icon">📊</span>概要
  </div>
  <div class="tab" onclick="switchTab('applicants')">
    <span class="tab-icon">👥</span>申込者
  </div>
  <div class="tab" onclick="switchTab('danger')">
    <span class="tab-icon">⚠️</span>危険日程
  </div>
  <div class="tab" onclick="switchTab('relocation')">
    <span class="tab-icon">🔄</span>移動相談
  </div>
  <div class="tab" onclick="switchTab('decision')">
    <span class="tab-icon">✅</span>開催判断
  </div>
</div>

<!-- ダッシュボード -->
<div class="page active" id="page-dashboard">
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="totalApplicants">—</div>
        <div class="stat-label">総申込者数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="totalPeople">—</div>
        <div class="stat-label">総参加人数</div>
      </div>
    </div>

    <div class="section-title">日程別予約状況</div>
    <div class="date-cards" id="dateCards">
      <div class="empty">
        <div class="empty-icon">📅</div>
        <div class="empty-text">同期ボタンを押してデータを取得してください</div>
      </div>
    </div>
  </div>
</div>

<!-- 申込者一覧 -->
<div class="page" id="page-applicants">
  <div class="content">
    <div class="filter-row" id="filterRow">
      <button class="filter-chip active" onclick="filterApplicants('all')">すべて</button>
    </div>
    <div class="applicant-list" id="applicantList">
      <div class="empty">
        <div class="empty-icon">👥</div>
        <div class="empty-text">データを同期してください</div>
      </div>
    </div>
  </div>
</div>

<!-- 危険日程 -->
<div class="page" id="page-danger">
  <div class="content">
    <div class="section-title">重複・満席リスク</div>
    <div id="dangerContent">
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-text">データを同期してください</div>
      </div>
    </div>
  </div>
</div>

<!-- 移動相談 -->
<div class="page" id="page-relocation">
  <div class="content">
    <div class="section-title">日程変更を希望する申込者</div>
    <div id="relocationContent">
      <div class="empty">
        <div class="empty-icon">🔄</div>
        <div class="empty-text">データを同期してください</div>
      </div>
    </div>
  </div>
</div>

<!-- 開催判断 -->
<div class="page" id="page-decision">
  <div class="content">
    <div class="section-title">日程ごとの開催状況</div>
    <div id="decisionContent">
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-text">データを同期してください</div>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">データを取得中...</div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwry7F4jOi80E25qy3WkBPWmCyRSb9QVGxyhntd9_Qqc2YR5iPqPpUkpwyawUBRdAfjHA/exec';

// 日程マスタ
const DATES = [
  { id: '7/5',  label: '7月5日（土）',  month: '7月', day: '5',  dow: '土', time: '午前10時', capacity: 8 },
  { id: '7/12', label: '7月12日（土）', month: '7月', day: '12', dow: '土', time: '午前10時', capacity: 8 },
  { id: '7/19', label: '7月19日（土）', month: '7月', day: '19', dow: '土', time: '午前10時', capacity: 8 },
  { id: '7/26', label: '7月26日（土）', month: '7月', day: '26', dow: '土', time: '午前10時', capacity: 8 },
];

// ローカル開催判断状態
const DECISION_KEY = 'cooking_decisions';
function getDecisions() {
  try { return JSON.parse(localStorage.getItem(DECISION_KEY) || '{}'); } catch { return {}; }
}
function saveDecision(dateId, status) {
  const d = getDecisions();
  d[dateId] = status;
  localStorage.setItem(DECISION_KEY, JSON.stringify(d));
}

let allData = [];
let currentFilter = 'all';
let currentTab = 'dashboard';

// タブ切替
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['dashboard','applicants','danger','relocation','decision'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
}

// 同期
async function syncData() {
  const btn = document.getElementById('syncBtn');
  const icon = document.getElementById('syncIcon');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  btn.classList.add('loading');
  dot.className = 'status-dot loading';
  statusText.textContent = 'データを取得中...';
  document.getElementById('loadingOverlay').classList.add('show');

  try {
    const res = await fetch(GAS_URL + '?action=getAll', { mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();

    if (json.status === 'ok') {
      allData = json.data || [];
      renderAll();
      dot.className = 'status-dot ok';
      const now = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
      statusText.textContent = `最終同期: ${now} — ${allData.length}件取得`;
      showToast(`✅ ${allData.length}件のデータを取得しました`);
    } else {
      throw new Error(json.message || 'エラー');
    }
  } catch (e) {
    dot.className = 'status-dot err';
    statusText.textContent = 'エラー: ' + e.message;
    showToast('❌ 取得に失敗しました: ' + e.message);
    console.error(e);
  } finally {
    btn.classList.remove('loading');
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function renderAll() {
  renderDashboard();
  renderApplicants();
  renderDanger();
  renderRelocation();
  renderDecision();
}

// 日程IDを正規化
function normDate(str) {
  str = String(str).replace(/\s/g, ''); str = str.toString().replace(/ /g, "");
  if (!str) return '';
  str = str.toString().trim();
  const m = str.match(/(\d+)月\s*(\d+)/) || str.match(/(\d+)月(\d+)日/);
  if (m) return m[1] + '/' + m[2];
  return str;
}

// 日程別集計
function getDateStats() {
  const stats = {};
  DATES.forEach(d => { stats[d.id] = { count: 0, people: 0, names: [] }; });

  allData.forEach(row => {
    const d1 = normDate(row.date1);
    const d2 = normDate(row.date2);
    const people = parseInt(row.people) || 1;
    const name = row.name || '名前なし';

    if (stats[d1]) {
      stats[d1].count++;
      stats[d1].people += people;
      stats[d1].names.push(name);
    }
    if (d2 && d2 !== d1 && stats[d2]) {
      // 第二希望はカウントしない（参考のみ）
    }
  });
  return stats;
}

// ダッシュボード
function renderDashboard() {
  const stats = getDateStats();
  const total = allData.length;
  const totalPeople = allData.reduce((s, r) => s + (parseInt(r.people) || 1), 0);

  document.getElementById('totalApplicants').textContent = total;
  document.getElementById('totalPeople').textContent = totalPeople;

  const container = document.getElementById('dateCards');
  if (DATES.length === 0) { container.innerHTML = '<div class="empty"><div class="empty-text">日程がありません</div></div>'; return; }

  container.innerHTML = DATES.map(d => {
    const s = stats[d.id] || { count: 0, people: 0 };
    const pct = Math.min(100, Math.round(s.people / d.capacity * 100));
    const cls = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : 'open';
    const fillCls = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : '';
    return `<div class="date-card ${cls}" onclick="showDateDetail('${d.id}')">
      <div class="date-badge">
        <div class="date-month">${d.month}</div>
        <div class="date-day">${d.day}</div>
        <div class="date-dow">${d.dow}</div>
      </div>
      <div class="date-info">
        <div class="date-name">${d.label}</div>
        <div class="date-meta">${d.time} · 定員${d.capacity}名</div>
        <div class="capacity-bar"><div class="capacity-fill ${fillCls}" style="width:${pct}%"></div></div>
      </div>
      <div class="date-count">
        <div class="count-num">${s.people}</div>
        <div class="count-label">/ ${d.capacity}名</div>
      </div>
    </div>`;
  }).join('');
}

// 申込者一覧
function renderApplicants(filter) {
  if (filter !== undefined) currentFilter = filter;

  // フィルターチップ更新
  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = `<button class="filter-chip ${currentFilter==='all'?'active':''}" onclick="filterApplicants('all')">すべて</button>`
    + DATES.map(d => `<button class="filter-chip ${currentFilter===d.id?'active':''}" onclick="filterApplicants('${d.id}')">${d.label.replace('（土）','')}</button>`).join('');

  const filtered = currentFilter === 'all'
    ? allData
    : allData.filter(r => normDate(r.date1) === currentFilter || normDate(r.date2) === currentFilter);

  const container = document.getElementById('applicantList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">該当する申込者はいません</div></div>';
    return;
  }

  container.innerHTML = filtered.map((r, i) => {
    const d1 = normDate(r.date1);
    const d2 = normDate(r.date2);
    const idx = allData.indexOf(r);
    return `<div class="applicant-card" onclick="showApplicantDetail(${idx})">
      <div class="applicant-header">
        <div class="applicant-name">${r.name || '名前なし'}</div>
        <div class="applicant-count">${String(r.people || 1).replace(/名/g, "")}名</div>
      </div>
      <div class="applicant-dates">
        <span class="applicant-date-tag">第一希望: ${r.date1 || '未選択'}</span>
        ${d2 ? `<span class="applicant-date-tag">第二希望: ${r.date2}</span>` : ''}
      </div>
      ${r.note ? `<div class="applicant-note">📝 ${r.note}</div>` : ''}
    </div>`;
  }).join('');
}

function filterApplicants(dateId) {
  currentFilter = dateId;
  renderApplicants();
}

// 危険日程
function renderDanger() {
  const stats = getDateStats();
  const container = document.getElementById('dangerContent');
  const dangers = [];

  DATES.forEach(d => {
    const s = stats[d.id] || { count: 0, people: 0, names: [] };
    if (s.people >= d.capacity * 0.75) {
      dangers.push({ date: d, stats: s });
    }
  });

  if (dangers.length === 0) {
    container.innerHTML = '<div class="danger-empty">⭕ 現在、危険な日程はありません</div>';
    return;
  }

  container.innerHTML = dangers.map(({ date, stats: s }) => {
    const pct = Math.round(s.people / date.capacity * 100);
    const isFull = s.people >= date.capacity;
    return `<div class="danger-card">
      <div class="danger-header">
        <span class="danger-icon">${isFull ? '🔴' : '🟡'}</span>
        <span class="danger-date-name">${date.label} — ${s.people}/${date.capacity}名 (${pct}%)</span>
      </div>
      <div class="danger-list">${s.names.map(n => `・${n}`).join('<br>') || '（申込者なし）'}</div>
    </div>`;
  }).join('');
}

// 移動相談
function renderRelocation() {
  const container = document.getElementById('relocationContent');
  const want = allData.filter(r => r.relocation && r.relocation.includes('相談'));

  if (want.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">日程変更の相談はありません</div></div>';
    return;
  }

  container.innerHTML = want.map(r => `
    <div class="relocation-card">
      <div class="relocation-name">${r.name || '名前なし'} (${String(r.people || 1).replace(/名/g, "")}名)</div>
      <div class="relocation-detail">
        第一希望: ${r.date1 || '—'}<br>
        第二希望: ${r.date2 || '—'}<br>
        ${r.note ? `備考: ${r.note}` : ''}
      </div>
    </div>
  `).join('');
}

// 開催判断
function renderDecision() {
  const stats = getDateStats();
  const decisions = getDecisions();
  const container = document.getElementById('decisionContent');

  container.innerHTML = DATES.map(d => {
    const s = stats[d.id] || { count: 0, people: 0 };
    const status = decisions[d.id] || 'pending';
    const statusLabels = { open: '開催確定', closed: '中止', pending: '検討中' };
    return `<div class="decision-card">
      <div class="decision-date-name">${d.label}</div>
      <div class="decision-status-row">
        <span class="status-badge ${status}">${statusLabels[status]}</span>
        <span style="font-size:12px;color:var(--text3)">${String(s.people).replace(/名/g, "")}名申込</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="setDecision('${d.id}','open')">開催確定</button>
        <button class="btn btn-primary" onclick="setDecision('${d.id}','closed')">中止</button>
        <button class="btn btn-outline" onclick="setDecision('${d.id}','pending')">検討中</button>
      </div>
    </div>`;
  }).join('');
}

function setDecision(dateId, status) {
  saveDecision(dateId, status);
  renderDecision();
  const labels = { open: '開催確定', closed: '中止', pending: '検討中' };
  showToast('✅ ' + labels[status] + 'に設定しました');
}

// 日程詳細モーダル
function showDateDetail(dateId) {
  const date = DATES.find(d => d.id === dateId);
  if (!date) return;
  const stats = getDateStats();
  const s = stats[dateId] || { count: 0, people: 0, names: [] };
  const applicants = allData.filter(r => normDate(r.date1) === dateId);
  const decisions = getDecisions();
  const status = decisions[dateId] || 'pending';
  const statusLabels = { open: '開催確定', closed: '中止', pending: '検討中' };

  document.getElementById('modalTitle').textContent = date.label;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row"><span class="modal-label">開催時間</span><span class="modal-value">${date.time}</span></div>
    <div class="modal-row"><span class="modal-label">定員</span><span class="modal-value">${date.capacity}名</span></div>
    <div class="modal-row"><span class="modal-label">申込数</span><span class="modal-value">${s.count}件 (${String(s.people).replace(/名/g, "")})</span></div>
    <div class="modal-row"><span class="modal-label">開催判断</span><span class="modal-value">${statusLabels[status]}</span></div>
    <div style="margin-top:12px;font-size:11px;color:var(--text3);margin-bottom:6px;">申込者リスト</div>
    ${applicants.length === 0 ? '<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px">申込者なし</div>' :
      applicants.map(r => `<div class="modal-row"><span class="modal-label">${r.name || '名前なし'}</span><span class="modal-value">${String(r.people || 1).replace(/名/g, "")}名</span></div>`).join('')}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

// 申込者詳細モーダル
function showApplicantDetail(idx) {
  const r = allData[idx];
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.name || '名前なし';
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row"><span class="modal-label">参加人数</span><span class="modal-value">${String(r.people || 1).replace(/名/g, "")}名</span></div>
    <div class="modal-row"><span class="modal-label">第一希望</span><span class="modal-value">${r.date1 || '未選択'}</span></div>
    <div class="modal-row"><span class="modal-label">第二希望</span><span class="modal-value">${r.date2 || '—'}</span></div>
    <div class="modal-row"><span class="modal-label">日程変更相談</span><span class="modal-value">${r.relocation || '希望しない'}</span></div>
    ${r.note ? `<div class="modal-row"><span class="modal-label">備考</span><span class="modal-value">${r.note}</span></div>` : ''}
    <div class="modal-row"><span class="modal-label">申込日時</span><span class="modal-value">${r.timestamp || '—'}</span></div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// トースト
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// 起動時に同期
window.addEventListener('load', () => {
  setTimeout(syncData, 500);
});
</script>
</body>
</html>
